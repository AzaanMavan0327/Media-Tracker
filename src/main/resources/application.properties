# ===================================================================
# SERVER CONFIGURATION
# ===================================================================
# Tells the embedded web server to open and listen for networking traffic on port 8080
server.port=8080

# ===================================================================
# DATABASE CONFIGURATION (H2 In-Memory)
# ===================================================================
# Sets up a virtual, temporary SQL database instance named 'mediadb' inside your RAM
spring.datasource.url=jdbc:h2:mem:mediadb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# ===================================================================
# H2 WEB CONSOLE CONFIGURATION
# ===================================================================
# Exposes a visual user interface to explore your database tables at http://localhost:8080/h2-console
spring.h2.console.enabled=true

# ===================================================================
# HIBERNATE / JPA CONFIGURATION
# ===================================================================
# Debugging Feature: Prints the raw SQL commands directly inside your IntelliJ terminal window
# every time you make an API call from Postman
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ddl-auto=update: Instructs Hibernate to read your Java class blueprints (like MediaItem.java)
# and automatically build or modify the SQL tables to match them when the app boots up
spring.jpa.hibernate.ddl-auto=update

# ===================================================================
# CRITICAL FIX: MANIFEST SCRIPT BYPASS
# ===================================================================
# Tells Spring Boot NEVER to look for or execute manual sql scripts (like schema.sql or data.sql).
# This completely prevents the empty script crash and forces the system to rely purely on your Java entities.
spring.sql.init.mode=never